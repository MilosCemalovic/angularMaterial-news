<div class="page-container">
  <div class="page-header reporters-header" *transloco="let translate">
    <h1>
      <mat-icon>people</mat-icon>
      {{translate('reporters')}}
    </h1>
    <div class="divider"></div>
  </div>

  <ng-container *transloco="let translate">
    <div class="desktop">
      <div class="action-buttons">
        <button mat-flat-button color="primary" class="m-md">
          <mat-slide-toggle [(ngModel)]="isChecked" class="mr-sm">Pop-up</mat-slide-toggle>
          <mat-icon>{{isChecked ? 'thumb_up_alt' : 'thumb_down_alt'}}</mat-icon>
        </button>

        <button mat-flat-button color="accent" (click)="toggleMobilePreview()" class="m-md">
          <mat-icon>{{showMobilePreview ? 'phonelink_erase' : 'mobile_friendly'}}</mat-icon>
          {{showMobilePreview ? 'Hide Mobile' : 'Preview Mobile'}}
        </button>
      </div>

      <!-- Desktop Table View -->
      <div *ngIf="!showMobilePreview && !loading" class="table-wrapper mat-elevation-z2 content-card">

        <table mat-table [dataSource]="reporters">

          <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column">
            <th mat-header-cell *matHeaderCellDef> {{translate(column)}} </th>
            <td mat-cell *matCellDef="let element"> {{element[column]}} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columnsToDisplay; sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: columnsToDisplay;" (click)="onClick(row)"
            [ngClass]="{'selected': row.id === reporter?.id}" class="cursor-pointer"></tr>
        </table>
      </div>

      <div *ngIf="!isChecked && reporter && !showMobilePreview" class="m-lg content-card">
        <app-reporters-details [reporter]="reporter" [headings]="headings" [loading]="loading">
        </app-reporters-details>
      </div>

      <!-- Mobile Preview View (shown when toggled on desktop) -->
      <div *ngIf="showMobilePreview" class="mobile-preview">
        <p class="text-center">{{translate('clickDetails')}}</p>

        <mat-accordion>
          <mat-expansion-panel *ngFor="let reporter of reporters" hideToggle class="m-lg content-card">

            <mat-expansion-panel-header *ngFor="let column of displayedColumns">

              <mat-panel-title>
                <span> {{translate(column)}} </span>
              </mat-panel-title>

              <mat-panel-description class="m-0">
                <span> {{reporter[column]}} </span>
              </mat-panel-description>

            </mat-expansion-panel-header>

            <app-reporters-details [reporter]="reporter" [headings]="headings" [loading]="loading"
              style="font-size: x-small;">
            </app-reporters-details>

          </mat-expansion-panel>
        </mat-accordion>
      </div>
    </div>

    <!-- Native Mobile View (for actual mobile devices) -->
    <div class="mobile">
      <p class="text-center">{{translate('clickDetails')}}</p>

      <mat-accordion>
        <mat-expansion-panel *ngFor="let reporter of reporters" hideToggle class="m-lg content-card">

          <mat-expansion-panel-header *ngFor="let column of displayedColumns">

            <mat-panel-title>
              <span> {{translate(column)}} </span>
            </mat-panel-title>

            <mat-panel-description class="m-0">
              <span> {{reporter[column]}} </span>
            </mat-panel-description>

          </mat-expansion-panel-header>

          <app-reporters-details [reporter]="reporter" [headings]="headings" [loading]="loading"
            style="font-size: x-small;">
          </app-reporters-details>

        </mat-expansion-panel>
      </mat-accordion>
    </div>

  </ng-container>

  <mat-spinner *ngIf="loading"></mat-spinner>
</div>
