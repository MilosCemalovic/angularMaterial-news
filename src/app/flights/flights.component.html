<div class="page-container">
  <div class="page-header flights-header" *transloco="let translate">
    <h1>
      <mat-icon>flight</mat-icon>
      {{translate('workerFlights')}}
    </h1>
    <div class="divider"></div>
  </div>

  <mat-sidenav-container class="container" *transloco="let translate">

    <mat-sidenav #sidenav [autoFocus]="false">
      <app-flights-details [selectedWorkerFlights]="selectedWorkerFlights" (closeEmitter)="closeSidenav()">
      </app-flights-details>
    </mat-sidenav>

    <mat-sidenav-content>

      <p class="text-center">{{translate('clickDetails')}}</p>

      <mat-selection-list *ngIf="!loading" [multiple]="false" [(ngModel)]="selectedWorker"
        (ngModelChange)="onListSelect(selectedWorker)" class="m-lg mat-elevation-z2 content-card">

        <!-- <mat-list-option *ngFor="let worker of workers" [value]="worker" (click)="sidenav.open()"> -->
        <mat-list-option *ngFor="let worker of workers" [value]="worker" (click)="onWorkerClick()">
          {{worker.name}}
        </mat-list-option>

      </mat-selection-list>

    </mat-sidenav-content>

  </mat-sidenav-container>

  <mat-spinner *ngIf="loading"></mat-spinner>
</div>
